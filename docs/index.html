<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lifecycle-map · docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1e8;
    --paper-2: #ede8db;
    --ink: #0d0d0d;
    --ink-2: #2a2a28;
    --mute: #837d70;
    --rule: #b8b2a0;
    --rule-2: #d4cebe;
    --accent: #c2410c;
    --accent-2: #fed7aa;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Inter Tight', -apple-system, sans-serif;
    background: var(--paper); color: var(--ink); line-height: 1.6; font-size: 15px;
    background-image:
      linear-gradient(to right, rgba(13,13,13,0.022) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(13,13,13,0.022) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: 0.18; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.08 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  }
  ::selection { background: var(--accent-2); color: var(--ink); }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }
  aside.sidebar {
    border-right: 1px solid var(--ink);
    background: var(--paper);
    padding: 28px 20px 40px 32px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  aside .brand {
    margin-bottom: 24px;
  }
  aside .brand a {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: 'opsz' 60;
    font-size: 20px; color: var(--ink); text-decoration: none;
    letter-spacing: -0.015em;
  }
  aside .brand .sub {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mute); margin-top: 4px;
  }
  aside .lang-switch {
    display: flex; gap: 4px; margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  aside .lang-switch a {
    padding: 4px 8px; border: 1px solid var(--rule);
    color: var(--mute); text-decoration: none;
  }
  aside .lang-switch a.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  aside .lang-switch a:hover:not(.active) { background: var(--paper-2); color: var(--ink); }

  aside nav {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em;
  }
  aside nav ul { list-style: none; padding: 0; margin: 0; }
  aside nav > ul > li { margin-bottom: 6px; }
  aside nav a {
    color: var(--ink-2); text-decoration: none; padding: 4px 0; display: block;
  }
  aside nav a:hover { color: var(--accent); }
  aside nav a.active { color: var(--accent); border-left: 2px solid var(--accent); padding-left: 8px; margin-left: -10px; }

  main {
    padding: 56px 60px 80px;
    max-width: 820px;
  }
  main h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: 'opsz' 144; font-weight: 400;
    font-size: 44px; margin: 0 0 6px;
    letter-spacing: -0.022em; line-height: 1.05;
  }
  main h1 em { font-style: italic; font-weight: 300; color: var(--accent); }
  main .lead {
    font-size: 17px; color: var(--ink-2); margin: 8px 0 36px;
    max-width: 640px; line-height: 1.6;
  }
  main h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: 'opsz' 60; font-weight: 500;
    font-size: 26px; margin: 48px 0 14px;
    letter-spacing: -0.018em; scroll-margin-top: 20px;
  }
  main h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: 'opsz' 36; font-weight: 500;
    font-size: 19px; margin: 32px 0 10px;
    letter-spacing: -0.01em; scroll-margin-top: 20px;
  }
  main p { margin: 0 0 14px; }
  main ul, main ol { margin: 0 0 14px; padding-left: 22px; }
  main li { margin-bottom: 6px; }
  main code {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    background: var(--paper-2); border: 1px solid var(--rule-2);
    padding: 1px 5px; border-radius: 1px;
  }
  main pre {
    background: var(--ink); color: #f5f1e8;
    padding: 18px 20px; border-radius: 0;
    overflow-x: auto; margin: 16px 0 22px;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.55;
  }
  main pre code { background: transparent; border: 0; padding: 0; color: inherit; font-size: inherit; }
  main a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-2); }
  main a:hover { border-bottom-color: var(--accent); }
  main blockquote {
    margin: 16px 0; padding: 12px 18px;
    background: var(--paper-2); border-left: 3px solid var(--accent);
    font-style: italic; color: var(--ink-2);
  }
  main kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: var(--paper-2); border: 1px solid var(--rule);
    padding: 1px 5px; border-radius: 2px;
  }
  main table {
    width: 100%; border-collapse: collapse; margin: 16px 0;
    font-size: 13.5px;
  }
  main th, main td {
    text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--rule-2);
  }
  main th {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute);
    border-bottom-color: var(--ink);
  }

  details.example-src {
    margin: 14px 0 22px;
    border-top: 1px solid var(--rule-2);
  }
  details.example-src summary {
    cursor: pointer; user-select: none;
    font-family: 'JetBrains Mono', monospace; font-size: small;
    color: var(--mute); padding: 4px 0;
  }
  details.example-src summary:hover { color: var(--accent); }
  details.example-src[open] summary { color: var(--accent); font-weight: 500; }
  details.example-src pre { max-height: 360px; overflow: auto; }

  .section { display: none; }
  .section.active { display: block; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    aside.sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--ink); }
    main { padding: 32px 24px 60px; }
  }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <a href="../">lifecycle-map</a>
      <span class="sub">documentation</span>
    </div>
    <div class="lang-switch" id="lang-switch">
      <a href="?lang=en" data-lang="en">EN</a>
      <a href="?lang=pt" data-lang="pt">PT</a>
      <a href="?lang=es" data-lang="es">ES</a>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <main id="main">
    <!-- content rendered by JS based on language -->
  </main>
</div>

<!-- Section content loaded before bootstrap. Each registers onto window.LifecycleDocs.<lang>. -->
<script src="./sections/en.js"></script>
<script src="./sections/pt.js"></script>
<script src="./sections/es.js"></script>
<script src="./docs.js"></script>
</body>
</html>
