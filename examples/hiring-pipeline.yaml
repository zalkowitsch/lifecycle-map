# Hiring pipeline · YAML format · v2 schema (source/target + states)

meta:
  title:
    en: Software Hiring Pipeline (YAML)
    pt: Pipeline de Contratação (YAML)
    es: Pipeline de Contratación (YAML)
  subtitle:
    en: same map, written in YAML for readability
    pt: mesmo mapa, escrito em YAML para legibilidade
    es: el mismo mapa, escrito en YAML para legibilidad
  default_lang: en
  modes:
    - id: manual
      label:
        en: Manual
        pt: Manual
        es: Manual
      color: '#b91c1c'
    - id: assisted
      label:
        en: Tool-Assisted
        pt: Com ferramenta
        es: Con herramienta
      color: '#a16207'
    - id: automated
      label:
        en: Automated
        pt: Automatizado
        es: Automatizado
      color: '#1e40af'
    - id: ai
      label:
        en: AI-Augmented
        pt: Com IA
        es: Con IA
      color: '#047857'
    - id: n-a
      label:
        en: Not Applicable
        pt: Não se aplica
        es: No aplica
      color: '#6b6557'
lanes:
  - id: candidate
    label:
      en: Candidate
      pt: Candidato
      es: Candidato
    sub:
      en: the person being hired
      pt: a pessoa sendo contratada
      es: la persona contratada
  - id: sourcer
    label:
      en: Sourcer
      pt: Sourcer
      es: Sourcer
    sub:
      en: outbound · top of funnel
      pt: outbound · topo do funil
      es: outbound · tope del embudo
  - id: recruiter
    label:
      en: Recruiter
      pt: Recrutador
      es: Reclutador
    sub:
      en: owns the process
      pt: dono do processo
      es: dueño del proceso
  - id: hm
    label:
      en: Hiring Manager
      pt: Gestor
      es: Gerente
    sub:
      en: owns the hire
      pt: dono da contratação
      es: dueño de la contratación
  - id: interviewer
    label:
      en: Interviewer
      pt: Entrevistador
      es: Entrevistador
    sub:
      en: panel · signal-gathering
      pt: painel · coleta de sinais
      es: panel · recolectar señales
  - id: approver
    label:
      en: Approver
      pt: Aprovador
      es: Aprobador
    sub:
      en: VP / Director · sign-off
      pt: VP / Diretor · aprovação
      es: VP / Director · aprobación
phases:
  - id: sourcing
    label:
      en: Sourcing
      pt: Sourcing
      es: Sourcing
    roman: I
    subCols: 2
  - id: screen
    label:
      en: Screen
      pt: Triagem
      es: Cribado
    roman: II
  - id: phone
    label:
      en: Phone Interview
      pt: Entrevista por telefone
      es: Entrevista telefónica
    roman: III
  - id: onsite
    label:
      en: Onsite Loop
      pt: Painel presencial
      es: Panel presencial
    roman: IV
    subCols: 2
  - id: decision
    label:
      en: Decision
      pt: Decisão
      es: Decisión
    roman: V
    subCols: 2
  - id: offer
    label:
      en: Offer & Onboard
      pt: Oferta & Onboard
      es: Oferta y Onboard
    roman: VI
    subCols: 2
nodes:
  - id: openReq
    lane: hm
    phase: sourcing
    col: 0
    title:
      en: Open requisition
      pt: Abrir requisição
      es: Abrir requisición
    sub:
      en: headcount approved
      pt: headcount aprovado
      es: plantilla aprobada
    objective: Hiring manager defines the role, level, target start date, and gets sign-off on headcount.
    entity: Job requisition · Job description · Comp band
    actors: HM drafts → Recruiter reviews → Approver signs off on headcount
    triggers: Team growth need · Backfill · New project
    next: Sourcer starts outbound; recruiter posts publicly.
    states:
      today:
        mode: manual
        narrative:
          en: HM writes the JD from scratch in a doc. Recruiter rewrites for clarity. Comp band looked up manually in spreadsheet.
          pt: O Gestor escreve a JD do zero em um doc. Recrutador reescreve. Faixa salarial buscada manualmente em planilha.
          es: El Gerente escribe la JD desde cero en un doc. El Reclutador la reescribe. La banda salarial se busca manualmente.
        tools:
          - Google Docs
          - Comp spreadsheet
          - Email
      tomorrow:
        mode: ai
        narrative:
          en: AI drafts the JD from a 3-line brief + role template + recent successful hires. Comp band auto-populated.
          pt: IA escreve a JD a partir de um brief de 3 linhas + template + contratações recentes. Faixa salarial auto-populada.
          es: La IA redacta la JD desde un brief de 3 líneas + plantilla + contrataciones recientes. Banda salarial auto-poblada.
  - id: sourceCandidates
    lane: sourcer
    phase: sourcing
    col: 1
    title:
      en: Source candidates
      pt: Buscar candidatos
      es: Buscar candidatos
    sub:
      en: outbound + inbound funnel
      pt: funil outbound + inbound
      es: embudo outbound + inbound
    objective: Build a pipeline of qualified candidates through outbound, referrals, and inbound applications.
    states:
      today:
        mode: assisted
        narrative:
          en: Sourcer searches LinkedIn manually. Templates pasted from a doc.
          pt: Sourcer busca no LinkedIn manualmente. Templates colados de um doc.
          es: El Sourcer busca en LinkedIn manualmente. Plantillas pegadas desde un doc.
      tomorrow:
        mode: ai
        narrative:
          en: AI scores candidates, drafts personalized outreach, A/B tests subject lines.
          pt: IA pontua candidatos, escreve outreach personalizado, faz A/B test nos assuntos.
          es: La IA puntúa candidatos, redacta outreach personalizado, hace A/B test en los asuntos.
  - id: applies
    lane: candidate
    phase: sourcing
    col: 1
    title:
      en: Apply / respond
      pt: Aplicar / responder
      es: Aplicar / responder
    objective: Candidate either responds to outreach or applies via job board.
    states:
      today:
        mode: automated
        narrative:
          en: Standard ATS application form. Resume parsed.
          pt: Formulário padrão do ATS. Currículo parseado.
          es: Formulario estándar del ATS. CV parseado.
      tomorrow:
        mode: ai
        narrative:
          en: Conversational AI agent captures structured info beyond the resume.
          pt: Agente conversacional de IA captura info estruturada além do currículo.
          es: Agente conversacional de IA captura info estructurada más allá del CV.
edges:
  - source: openReq
    target: sourceCandidates
  - source: sourceCandidates
    target: applies
