# Same hiring pipeline as hiring-pipeline.json, in YAML format.
# Use this to show that YAML is a first-class input format.

meta:
  title: Software Hiring Pipeline (YAML)
  subtitle: same map, written in YAML for readability
  modes:
    - { id: manual,    label: Manual,            color: "#b91c1c" }
    - { id: assisted,  label: Tool-Assisted,     color: "#a16207" }
    - { id: automated, label: Automated,         color: "#1e40af" }
    - { id: ai,        label: AI-Augmented,      color: "#047857" }
    - { id: n-a,       label: Not Applicable,    color: "#6b6557" }

lanes:
  - { id: candidate,   label: Candidate,      sub: the person being hired }
  - { id: sourcer,     label: Sourcer,        sub: outbound · top of funnel }
  - { id: recruiter,   label: Recruiter,      sub: owns the process }
  - { id: hm,          label: Hiring Manager, sub: owns the hire }
  - { id: interviewer, label: Interviewer,    sub: panel · signal-gathering }
  - { id: approver,    label: Approver,       sub: VP / Director · sign-off }

phases:
  - { id: sourcing, label: Sourcing,        roman: I,   subCols: 2 }
  - { id: screen,   label: Screen,          roman: II,  subCols: 1 }
  - { id: phone,    label: Phone Interview, roman: III, subCols: 1 }
  - { id: onsite,   label: Onsite Loop,     roman: IV,  subCols: 2 }
  - { id: decision, label: Decision,        roman: V,   subCols: 2 }
  - { id: offer,    label: Offer & Onboard, roman: VI,  subCols: 2 }

nodes:
  - id: openReq
    lane: hm
    phase: sourcing
    col: 0
    title: Open requisition
    sub: headcount approved
    objective: Hiring manager defines the role, level, target start date, and gets sign-off on headcount.
    entity: Job requisition · Job description · Comp band
    actors: HM drafts → Recruiter reviews → Approver signs off on headcount
    triggers: Team growth need · Backfill · New project
    next: Sourcer starts outbound; recruiter posts publicly.
    today:
      mode: manual
      narrative: HM writes the JD from scratch in a doc, often copying from old roles. Recruiter rewrites for clarity. Comp band looked up manually in spreadsheet.
      tools: [Google Docs, Comp spreadsheet, Email]
    tomorrow:
      mode: ai
      narrative: AI drafts the JD from a 3-line brief + role template + recent successful hires. Comp band auto-populated.

  - id: sourceCandidates
    lane: sourcer
    phase: sourcing
    col: 1
    title: Source candidates
    sub: outbound + inbound funnel
    objective: Build a pipeline of qualified candidates through outbound, referrals, and inbound applications.
    today: { mode: assisted, narrative: Sourcer searches LinkedIn manually. Templates pasted from a doc. }
    tomorrow: { mode: ai, narrative: AI scores candidates, drafts personalized outreach, A/B tests subject lines. }

  - id: applies
    lane: candidate
    phase: sourcing
    col: 1
    title: Apply / respond
    objective: Candidate either responds to outreach or applies via job board.
    today: { mode: automated, narrative: Standard ATS application form. Resume parsed. }
    tomorrow: { mode: ai, narrative: Conversational AI agent captures structured info beyond the resume. }

edges:
  - { from: openReq,          to: sourceCandidates }
  - { from: sourceCandidates, to: applies }
