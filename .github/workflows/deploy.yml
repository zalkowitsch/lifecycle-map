name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Concurrency: cancel in-progress deploys when a new commit lands
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Copy examples to dist
        # The viewer fetches ./examples/*.json at runtime — keep them deployed
        run: |
          mkdir -p dist/examples
          cp -r examples/* dist/examples/

      - name: Copy docs to dist
        # /docs/ is still served as static (vanilla HTML + per-language section files)
        run: |
          mkdir -p dist/docs
          cp -r docs/* dist/docs/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
